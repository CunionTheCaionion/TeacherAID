<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="start-page-body">

    <div id="startPageLanding" class="start-card-container">
        <div class="start-card-header">
            <h1 class="start-app-title">Hall Monitor</h1>
            <p class="start-app-subtitle">Track, manage, and optimize student runtime metrics seamlessly.</p>
        </div>
        <hr class="start-divider">
        <div class="start-card-actions" style="display: flex; justify-content: center; margin-bottom: 30px;">
            <div id="googleButtonDiv"></div>
        </div>
        <div class="start-card-footer">
            <p>Authorized access only. Secure cloud database environment.</p>
        </div>
    </div>

    <div id="mainApplicationWorkspace" style="display: none; width: 100%;">
        <input type="search" id="studentSearchInput" class="search-bar" placeholder="Search Students" oninput="executeGlobalSearch()">

        <link rel="stylesheet" href="style.css">
        <div class="sidenav">
            <a href="#" onclick="exitToDashboard()">Home</a>
            <a href="#">Account</a>
            <a href="#">Settings</a>
            <a href="#">My Students</a>
            <a href="#" onclick="exitToDashboard()">Dashboard</a>
        </div>
        
        <div id="dashboardView">
            <div class="line-container">
                <span class="line left-line"></span>
                <span class="text">My Periods</span>
                <span class="line right-line"></span>
            </div>
            <div id="periodsDisplayContainer" class="periods-grid"></div>
        </div>

        <div id="trackingView" class="tracking-screen-container" style="display: none;">
            <div class="tracking-header">
                <button class="back-dashboard-btn" onclick="exitToDashboard()">← Back to Dashboard</button>
                <h2 id="trackingPeriodTitle" class="tracking-period-title">Period Name</h2>
            </div>
            <div id="trackingRosterContainer" class="student-roster-list"></div>
        </div>

        <div id="searchResultView" class="tracking-screen-container" style="display: none;">
            <div class="tracking-header">
                <button class="back-dashboard-btn" onclick="clearSearchAndReturn()">✕ Clear Search</button>
                <h2 class="tracking-period-title">Global Student Search</h2>
            </div>
            <div id="searchResultsContainer" class="student-roster-list"></div>
        </div>

        <div id="periodModal" class="modal-overlay">
            <div class="modal-content">
                <h3 id="modalTitle">Create New Period</h3>
                <hr class="modal-divider">
                <input type="hidden" id="editingPeriodId" value="">
                <label for="periodName">Period Name</label>
                <input type="text" id="periodName" placeholder="e.g., 1st Period" autocomplete="off">
                <label>Select Students to Add</label>
                <div id="studentCheckboxContainer" class="student-checkbox-list"></div>
                <div class="modal-actions">
                    <button class="modal-btn cancel-btn" onclick="closeModal()">Cancel</button>
                    <button class="modal-btn save-btn" onclick="savePeriod()">Save</button>
                </div>
            </div>
        </div>
    </div>

<script>
  /* ==========================================================================
     SUPABASE & GOOGLE SHEETS CONFIGURATION
     ========================================================================= */
  const SUPABASE_URL = "https://zipxcbebimecwhppsinz.supabase.co"; 
  const SUPABASE_ANON_KEY = "sb_publishable_yBu1oTqbUVj-VJOba8zuyg_Sff_F9vj";
  
  // TODO: PASTE YOUR GOOGLE SHEETS CSV LINK HERE!
  const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTEjSntfQqKHF0IMKgqz3ByZ_2OacOK8Y4k-faFK7ymjxv8AMWxcSfPsyyFyPOSfugQWAyD6yLnuhpq/pub?output=csv";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let masterStudentDatabase = []; // Populated dynamically from Google Sheet
  let savedPeriods = [];
  let currentUserUid = null;
  let activeTimers = {}; 
  let activePeriodId = null;
  let preSearchScreenState = 'dashboard'; 

  /* ==========================================================================
     OFFICIAL GOOGLE AUTHENTICATION INITIALIZATION
     ========================================================================= */
  window.addEventListener('load', function () {
    if (window.google && google.accounts && google.accounts.id) {
        google.accounts.id.initialize({
          client_id: "502418828163-e3m3oehkr11m1o1l4808jm1qd72vi7f7.apps.googleusercontent.com",
          callback: handleCredentialResponse
        });
        
        google.accounts.id.renderButton(
          document.getElementById("googleButtonDiv"),
          { theme: "outline", size: "large", width: "340" } 
        );
    }
  });

  async function handleCredentialResponse(response) {
    const { data, error } = await supabaseClient.auth.signInWithIdToken({
      provider: 'google',
      token: response.credential
    });

    if (error) {
      alert("Database Authentication Failed: " + error.message);
      return;
    }

    currentUserUid = data.user.id;

    document.getElementById('startPageLanding').style.display = 'none';
    document.body.classList.remove('start-page-body');
    document.getElementById('mainApplicationWorkspace').style.display = 'block';

    // Fetch master list from Google Sheet first, then load teacher data
    await loadStudentsFromGoogleSheet();
    await loadDataFromSupabase();
    renderPeriodsDashboard();
  }

  /* ==========================================================================
     GOOGLE SHEETS PARSER
     ========================================================================= */
  async function loadStudentsFromGoogleSheet() {
    if (!GOOGLE_SHEET_CSV_URL || GOOGLE_SHEET_CSV_URL.startsWith("YOUR_")) {
      console.warn("Google Sheet URL missing. Falling back to default list.");
      masterStudentDatabase = [
        { id: "s1", name: "Alex Johnson" },
        { id: "s2", name: "Brian Smith" }
      ];
      return;
    }

    try {
      const response = await fetch(GOOGLE_SHEET_CSV_URL);
      const csvText = await response.text();
      
      // Split by line breaks and process rows
      const lines = csvText.split(/\r?\n/);
      const parsedStudents = [];
      
      // Start at 1 to skip header row ("Name")
      for (let i = 1; i < lines.length; i++) {
        const name = lines[i].trim();
        if (name) {
          parsedStudents.push({
            id: "sheet_s_" + i,
            name: name
          });
        }
      }
      
      masterStudentDatabase = parsedStudents;
      console.log(`Successfully loaded ${masterStudentDatabase.length} students from Google Sheet.`);
    } catch (err) {
      console.error("Failed to fetch data from Google Sheet:", err);
    }
  }

  /* ==========================================================================
     CLOUD DATA SYNC ENGINES
     ========================================================================= */
  async function loadDataFromSupabase() {
    try {
      const { data, error } = await supabaseClient
        .from('student_periods')
        .select('periods_data')
        .eq('user_id', currentUserUid)
        .single();

      if (error && error.code !== 'PGRST116') { 
        console.error("Error reading cloud data:", error);
      }

      if (data && data.periods_data) {
        savedPeriods = data.periods_data;
      } else {
        savedPeriods = [];
      }
    } catch (err) {
      console.error(err);
    }
  }

  async function saveToSupabase() {
    if (!currentUserUid) return;
    
    const { error } = await supabaseClient
      .from('student_periods')
      .upsert({ 
        user_id: currentUserUid, 
        periods_data: savedPeriods,
        updated_at: new Date().toISOString()
      });

    if (error) {
      console.error("Could not sync data online:", error.message);
    }
  }

  function loadStudentChecklist(selectedStudentIds = []) {
    const container = document.getElementById('studentCheckboxContainer');
    container.innerHTML = '';
    
    masterStudentDatabase.forEach(student => {
      const isChecked = selectedStudentIds.includes(student.id) ? 'checked' : '';
      const label = document.createElement('label');
      label.className = 'student-checkbox-item';
      label.setAttribute('data-student-name', student.name.toLowerCase()); 
      label.innerHTML = `
        <input type="checkbox" value="${student.id}" data-name="${student.name}" ${isChecked}>
        <span>${student.name}</span>
      `;
      container.appendChild(label);
    });
  }

  function openModalForCreate() {
    document.getElementById('modalTitle').innerText = "Create New Period";
    document.getElementById('editingPeriodId').value = ""; 
    document.getElementById('periodName').value = "";
    document.getElementById('periodModal').style.display = 'flex';
    document.getElementById('periodName').focus();
    loadStudentChecklist(); 
  }

  function openModalForEdit(event, periodId) {
    event.stopPropagation(); 
    const period = savedPeriods.find(p => p.id === periodId);
    if (!period) return;

    document.getElementById('modalTitle').innerText = "Edit Period";
    document.getElementById('editingPeriodId').value = period.id;
    document.getElementById('periodName').value = period.name;
    document.getElementById('periodModal').style.display = 'flex';
    document.getElementById('periodName').focus();
    
    loadStudentChecklist(period.studentIds);
  }

  function closeModal() {
    document.getElementById('periodModal').style.display = 'none';
  }

  async function savePeriod() {
    const periodName = document.getElementById('periodName').value.trim();
    const editingId = document.getElementById('editingPeriodId').value;

    if (periodName === '') {
      alert('Please enter a period name.');
      return;
    }
    
    const checkedBoxes = document.querySelectorAll('#studentCheckboxContainer input[type="checkbox"]:checked');
    const selectedStudentIds = Array.from(checkedBoxes).map(box => box.value);

    if (editingId) {
      const periodIndex = savedPeriods.findIndex(p => p.id === editingId);
      if (periodIndex !== -1) {
        savedPeriods[periodIndex].name = periodName;
        savedPeriods[periodIndex].studentIds = selectedStudentIds;
      }
    } else {
      const newPeriod = {
        id: 'per_' + Date.now(),
        name: periodName,
        studentIds: selectedStudentIds,
        timerStates: {} 
      };
      savedPeriods.push(newPeriod);
    }

    renderPeriodsDashboard();
    closeModal();
    await saveToSupabase(); 
  }

  async function deletePeriod(event, periodId) {
    event.stopPropagation(); 
    if (confirm("Are you sure you want to delete this period?")) {
      savedPeriods = savedPeriods.filter(p => p.id !== periodId);
      renderPeriodsDashboard();
      await saveToSupabase(); 
    }
  }

  function renderPeriodsDashboard() {
    const displayContainer = document.getElementById('periodsDisplayContainer');
    displayContainer.innerHTML = '';

    savedPeriods.forEach(period => {
      const card = document.createElement('div');
      card.className = 'period-dashboard-card';
      card.onclick = () => launchTrackingScreen(period.id); 
      
      const studentCount = period.studentIds.length;

      card.innerHTML = `
        <div class="card-header">
          <h4>${period.name}</h4>
          <span class="student-count-badge">${studentCount} Students</span>
        </div>
        <div class="card-actions">
          <button class="action-link-btn edit-link" onclick="openModalForEdit(event, '${period.id}')">Edit</button>
          <button class="action-link-btn delete-link" onclick="deletePeriod(event, '${period.id}')">Delete</button>
        </div>
      `;
      displayContainer.appendChild(card);
    });

    const buttonCard = document.createElement('div');
    buttonCard.className = 'add-button-grid-item';
    buttonCard.innerHTML = `
      <button class="add-period-box-btn-inline" onclick="openModalForCreate()">
        <span class="box-plus-icon">+</span>
        <span class="box-btn-text">Add Period</span>
      </button>
    `;
    displayContainer.appendChild(buttonCard);
  }

  /* ==========================================================================
     TIMING TRACKING CONTROLLER LOGIC
     ========================================================================= */
  function launchTrackingScreen(periodId) {
    const period = savedPeriods.find(p => p.id === periodId);
    if (!period) return;

    activePeriodId = periodId;
    preSearchScreenState = 'tracking';
    document.getElementById('trackingPeriodTitle').innerText = period.name;
    document.getElementById('studentSearchInput').value = '';

    document.getElementById('dashboardView').style.display = 'none';
    document.getElementById('searchResultView').style.display = 'none';
    document.getElementById('trackingView').style.display = 'block';

    renderTrackingRoster(period);
  }

  function exitToDashboard() {
    Object.keys(activeTimers).forEach(studentId => {
      clearInterval(activeTimers[studentId].intervalId);
    });
    activeTimers = {};
    activePeriodId = null;
    preSearchScreenState = 'dashboard';
    document.getElementById('studentSearchInput').value = '';

    document.getElementById('trackingView').style.display = 'none';
    document.getElementById('searchResultView').style.display = 'none';
    document.getElementById('dashboardView').style.display = 'block';
    renderPeriodsDashboard();
  }

  function renderTrackingRoster(period) {
    const rosterContainer = document.getElementById('trackingRosterContainer');
    rosterContainer.innerHTML = '';

    if (period.studentIds.length === 0) {
      rosterContainer.innerHTML = '<p class="empty-state-text">No students added to this period yet. Edit the period to assign roster students.</p>';
      return;
    }

    period.studentIds.forEach(studentId => {
      const studentData = masterStudentDatabase.find(s => s.id === studentId);
      if (!studentData) return;

      if (!period.timerStates[studentId]) {
        period.timerStates[studentId] = { elapsedMs: 0, isRunning: false, lastStartTime: null };
      }

      const state = period.timerStates[studentId];
      const timeString = formatMsToTime(state.elapsedMs);

      const row = document.createElement('div');
      row.className = 'student-timer-row';
      row.setAttribute('data-student-name', studentData.name.toLowerCase()); 
      row.innerHTML = `
        <span class="timer-student-name">${studentData.name}</span>
        <div class="timer-controls-group">
          <span id="display-${studentId}" class="timer-digital-readout">${timeString}</span>
          <button id="btn-toggle-${studentId}" class="timer-action-btn start-btn" onclick="toggleStudentTimer('${studentId}')">Start</button>
          <button class="timer-action-btn reset-btn" onclick="resetStudentTimer('${studentId}')">Reset</button>
        </div>
      `;
      rosterContainer.appendChild(row);

      if (state.isRunning) {
        resumeTimerEngine(studentId);
      }
    });
  }

  /* ==========================================================================
     GLOBAL SEARCH FILTER ENGINE
     ========================================================================= */
  function executeGlobalSearch() {
    const query = document.getElementById('studentSearchInput').value.trim().toLowerCase();
    const modalIsVisible = document.getElementById('periodModal').style.display === 'flex';

    if (modalIsVisible) {
      const checkboxRows = document.querySelectorAll('#studentCheckboxContainer .student-checkbox-item');
      checkboxRows.forEach(row => {
        const studentName = row.getAttribute('data-student-name');
        if (studentName.includes(query)) {
          row.style.setProperty('display', 'flex', 'important');
        } else {
          row.style.setProperty('display', 'none', 'important');
        }
      });
      return;
    }

    if (query === '') {
      clearSearchAndReturn();
      return;
    }

    if (document.getElementById('searchResultView').style.display === 'none') {
      if (document.getElementById('trackingView').style.display === 'block') {
        preSearchScreenState = 'tracking';
      } else {
        preSearchScreenState = 'dashboard';
      }
    }

    document.getElementById('dashboardView').style.display = 'none';
    document.getElementById('trackingView').style.display = 'none';
    document.getElementById('searchResultView').style.display = 'block';

    renderSearchResultsWindow(query);
  }

  function renderSearchResultsWindow(query) {
    const resultsContainer = document.getElementById('searchResultsContainer');
    resultsContainer.innerHTML = '';

    const matchedStudents = masterStudentDatabase.filter(student => 
      student.name.toLowerCase().includes(query)
    );

    if (matchedStudents.length === 0) {
      resultsContainer.innerHTML = '<p class="empty-state-text">No matching student records found in database.</p>';
      return;
    }

    matchedStudents.forEach(student => {
      const assignedPeriods = savedPeriods.filter(p => p.studentIds.includes(student.id)).map(p => p.name);
      const periodString = assignedPeriods.length > 0 ? assignedPeriods.join(', ') : 'Unassigned';

      const row = document.createElement('div');
      row.className = 'student-timer-row';
      row.innerHTML = `
        <div>
          <span class="timer-student-name" style="display:block;">${student.name}</span>
          <span class="student-count-badge" style="font-size:0.8rem;">Periods: ${periodString}</span>
        </div>
        <div class="timer-controls-group">
          <span class="timer-digital-readout" style="min-width:140px; font-size:1.1rem; color:#666666;">Weekly: --:--.-</span>
        </div>
      `;
      resultsContainer.appendChild(row);
    });
  }

  function clearSearchAndReturn() {
    document.getElementById('studentSearchInput').value = '';
    document.getElementById('searchResultView').style.display = 'none';

    if (preSearchScreenState === 'tracking' && activePeriodId !== null) {
      document.getElementById('dashboardView').style.display = 'none';
      document.getElementById('trackingView').style.display = 'block';
    } else {
      document.getElementById('trackingView').style.display = 'none';
      document.getElementById('dashboardView').style.display = 'block';
      renderPeriodsDashboard();
    }
  }

  function toggleStudentTimer(studentId) {
    const period = savedPeriods.find(p => p.id === activePeriodId);
    const state = period.timerStates[studentId];
    const button = document.getElementById(`btn-toggle-${studentId}`);

    if (!state.isRunning) {
      state.isRunning = true;
      state.lastStartTime = Date.now() - state.elapsedMs;
      button.innerText = "Pause";
      button.classList.remove('start-btn');
      button.classList.add('pause-btn');

      const intervalId = setInterval(() => {
        state.elapsedMs = Date.now() - state.lastStartTime;
        document.getElementById(`display-${studentId}`).innerText = formatMsToTime(state.elapsedMs);
        saveToSupabase(); 
      }, 100);

      activeTimers[studentId] = { intervalId: intervalId };
    } else {
      state.isRunning = false;
      clearInterval(activeTimers[studentId].intervalId);
      delete activeTimers[studentId];
      
      button.innerText = "Start";
      button.classList.remove('pause-btn');
      button.classList.add('start-btn');
      saveToSupabase();
    }
  }

  function resumeTimerEngine(studentId) {
    const period = savedPeriods.find(p => p.id === activePeriodId);
    const state = period.timerStates[studentId];
    const button = document.getElementById(`btn-toggle-${studentId}`);

    button.innerText = "Pause";
    button.classList.remove('start-btn');
    button.classList.add('pause-btn');

    const intervalId = setInterval(() => {
      state.elapsedMs = Date.now() - state.lastStartTime;
      document.getElementById(`display-${studentId}`).innerText = formatMsToTime(state.elapsedMs);
      saveToSupabase();
    }, 100);

    activeTimers[studentId] = { intervalId: intervalId };
  }

  function resetStudentTimer(studentId) {
    const period = savedPeriods.find(p => p.id === activePeriodId);
    const state = period.timerStates[studentId];

    if (state.isRunning) {
      clearInterval(activeTimers[studentId].intervalId);
      delete activeTimers[studentId];
    }

    state.isRunning = false;
    state.elapsedMs = 0;
    state.lastStartTime = null;

    document.getElementById(`display-${studentId}`).innerText = "00:00.0";
    const button = document.getElementById(`btn-toggle-${studentId}`);
    button.innerText = "Start";
    button.classList.remove('pause-btn');
    button.classList.add('start-btn');
    saveToSupabase();
  }

  function formatMsToTime(ms) {
    let totalSeconds = Math.floor(ms / 1000);
    let minutes = Math.floor(totalSeconds / 60);
    let seconds = totalSeconds % 60;
    let tenths = Math.floor((ms % 1000) / 100);

    let minStr = minutes < 10 ? '0' + minutes : minutes;
    let secStr = seconds < 10 ? '0' + seconds : seconds;

    return `${minStr}:${secStr}.${tenths}`;
  }
</script>

</body>
</html>
